version: '3.9'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: playto_payout
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py setup_beat &&
             python manage.py seed &&
             gunicorn payout_engine.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    environment:
      DEBUG: "True"
      SECRET_KEY: "docker-dev-secret-key"
      DB_HOST: db
      DB_NAME: playto_payout
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_URL: redis://redis:6379/0
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # NO volume mount — let Docker use the files baked into the image

  celery_worker:
    build:
      context: ./backend
    command: >
      sh -c "celery -A payout_engine worker -l info -c 4"
    environment:
      DEBUG: "True"
      SECRET_KEY: "docker-dev-secret-key"
      DB_HOST: db
      DB_NAME: playto_payout
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_URL: redis://redis:6379/0
    depends_on:
      backend:
        condition: service_healthy
    # NO volume mount

  celery_beat:
    build:
      context: ./backend
    command: >
      sh -c "celery -A payout_engine beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler"
    environment:
      DEBUG: "True"
      SECRET_KEY: "docker-dev-secret-key"
      DB_HOST: db
      DB_NAME: playto_payout
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_URL: redis://redis:6379/0
    depends_on:
      backend:
        condition: service_healthy
    # NO volume mount

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
